<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drums - Player Mode - AirJam</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        /* ===== Harmonic · Drums, Neo-brutalism + opaque glassmorphism ===== */
        :root {
            --ink: #17150f;
            --cream: #f6f1e7;
            --accent: #0ea5e9;
            --accent-deep: #0284c7;
            --paper: #ffffff;
            --glass: rgba(255, 255, 255, 0.9);
            --shadow: 6px 6px 0 var(--ink);
            --shadow-sm: 4px 4px 0 var(--ink);
            --shadow-press: 2px 2px 0 var(--ink);
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Hanken Grotesk', system-ui, -apple-system, sans-serif;
            background-color: var(--cream);
            background-image:
                radial-gradient(circle, rgba(23, 21, 15, 0.07) 1.4px, transparent 1.4px);
            background-size: 22px 22px;
            color: var(--ink);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.01em;
        }

        /* Hide the old dark animated background that may come from styles.css */
        .animated-bg {
            display: none !important;
        }

        /* ===== Header ===== */
        .mode-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            flex-wrap: wrap;
            padding: 18px 22px;
            max-width: 1180px;
            margin: 18px auto 6px;
            background: linear-gradient(135deg, var(--accent), var(--accent-deep));
            border: 3px solid var(--ink);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: var(--paper);
            border: 3px solid var(--ink);
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            color: var(--ink);
            font-weight: 800;
            font-size: 0.95rem;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.16s ease, box-shadow 0.16s ease;
        }

        .back-btn:hover {
            transform: translate(-1px, -1px);
            box-shadow: 5px 5px 0 var(--ink);
        }

        .back-btn:active {
            transform: translate(4px, 4px);
            box-shadow: var(--shadow-press);
        }

        .back-btn .back-arrow {
            font-size: 1.15rem;
            line-height: 1;
        }

        .mode-title {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--paper);
            font-size: 1.55rem;
            font-weight: 900;
            letter-spacing: -0.02em;
            text-shadow: 2px 2px 0 rgba(23, 21, 15, 0.55);
        }

        .mode-title .title-emoji {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            background: var(--paper);
            border: 3px solid var(--ink);
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            font-size: 1.3rem;
            text-shadow: none;
        }

        /* ===== Status badge, opaque glass ===== */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            padding: 9px 16px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 3px solid var(--ink);
            border-radius: 999px;
            box-shadow: var(--shadow-sm);
            color: var(--ink);
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .status-dot {
            width: 11px;
            height: 11px;
            background: #8a857a;
            border: 2px solid var(--ink);
            border-radius: 50%;
            flex: none;
        }

        /* ===== Legend ===== */
        .legend-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin: 16px auto 14px;
            max-width: 760px;
            padding: 0 22px;
        }

        .legend-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            border-radius: 999px;
            background: var(--paper);
            border: 3px solid var(--ink);
            box-shadow: var(--shadow-sm);
            transition: transform 0.16s ease, box-shadow 0.16s ease;
        }

        .legend-chip:hover {
            transform: translate(-1px, -1px);
            box-shadow: 5px 5px 0 var(--ink);
        }

        .legend-chip .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid var(--ink);
            flex: none;
        }

        .legend-chip span {
            color: var(--ink);
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: -0.01em;
        }

        /* ===== Camera area ===== */
        .cam-area {
            width: 100%;
            max-width: 1180px;
            margin: 0 auto 30px;
            padding: 0 22px;
            position: relative;
        }

        .cam-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            border-radius: var(--radius);
            overflow: visible;
            background: var(--ink);
            border: 4px solid var(--ink);
            box-shadow: 10px 10px 0 var(--ink), 0 0 0 4px var(--accent) inset, 0 0 38px rgba(14, 165, 233, 0.35);
        }

        .cam-wrap video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            border-radius: 11px;
        }

        .cam-wrap canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            border-radius: 11px;
        }

        /* ===== Finger info, opaque glass ===== */
        .cam-wrap .finger-info {
            position: absolute;
            bottom: 14px;
            left: 14px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 3px solid var(--ink);
            box-shadow: var(--shadow-sm);
            color: var(--ink);
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: -0.01em;
            padding: 8px 13px;
            border-radius: 11px;
            display: none;
        }

        /* ===== Start overlay ===== */
        .start-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 22px;
            background: rgba(23, 21, 15, 0.62);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            border-radius: 11px;
            z-index: 10;
        }

        .start-overlay .icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 78px;
            height: 78px;
            margin-bottom: 16px;
            background: var(--accent);
            border: 3px solid var(--ink);
            border-radius: 18px;
            box-shadow: var(--shadow);
            font-size: 2.4rem;
        }

        .start-overlay p {
            color: var(--paper);
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            margin: 0 0 22px;
            max-width: 320px;
        }

        .start-overlay button {
            padding: 15px 34px;
            border-radius: 14px;
            border: 3px solid var(--ink);
            background: var(--accent);
            color: var(--ink);
            font-family: inherit;
            font-size: 1.05rem;
            font-weight: 900;
            letter-spacing: -0.01em;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
        }

        .start-overlay button:hover {
            transform: translate(-1px, -1px);
            box-shadow: 7px 7px 0 var(--ink);
            background: #38bdf8;
        }

        .start-overlay button:active {
            transform: translate(6px, 6px);
            box-shadow: var(--shadow-press);
        }

        .start-overlay button:disabled {
            opacity: 0.75;
            cursor: progress;
            transform: none;
            box-shadow: var(--shadow);
        }

        /* ===== Denial / retry overlay (neo-brutalist, matches start overlay) ===== */
        .deny-overlay {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 22px;
            background: rgba(23, 21, 15, 0.72);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 11px;
            z-index: 12;
        }

        .deny-overlay.show {
            display: flex;
        }

        .deny-overlay .deny-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 78px;
            height: 78px;
            margin-bottom: 16px;
            background: var(--accent);
            border: 3px solid var(--ink);
            border-radius: 18px;
            box-shadow: var(--shadow);
        }

        .deny-overlay .deny-icon svg {
            width: 40px;
            height: 40px;
            display: block;
        }

        .deny-overlay h2 {
            color: var(--paper);
            font-size: 1.3rem;
            font-weight: 900;
            letter-spacing: -0.02em;
            margin: 0 0 8px;
            max-width: 360px;
        }

        .deny-overlay p {
            color: var(--paper);
            opacity: 0.92;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            margin: 0 0 22px;
            max-width: 340px;
        }

        .deny-overlay button {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            padding: 15px 32px;
            border-radius: 14px;
            border: 3px solid var(--ink);
            background: var(--accent);
            color: var(--ink);
            font-family: inherit;
            font-size: 1.05rem;
            font-weight: 900;
            letter-spacing: -0.01em;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
        }

        .deny-overlay button svg {
            width: 22px;
            height: 22px;
        }

        .deny-overlay button:hover {
            transform: translate(-1px, -1px);
            box-shadow: 7px 7px 0 var(--ink);
            background: #38bdf8;
        }

        .deny-overlay button:active {
            transform: translate(6px, 6px);
            box-shadow: var(--shadow-press);
        }

        /* ===== Focus visibility ===== */
        a:focus-visible,
        button:focus-visible {
            outline: 3px solid var(--ink);
            outline-offset: 3px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.4
            }
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .mode-header {
                margin: 12px auto 4px;
                padding: 14px 16px;
            }

            .mode-title {
                font-size: 1.25rem;
            }

            .mode-title .title-emoji {
                width: 36px;
                height: 36px;
                font-size: 1.1rem;
            }

            .cam-wrap {
                box-shadow: 7px 7px 0 var(--ink), 0 0 0 4px var(--accent) inset, 0 0 28px rgba(14, 165, 233, 0.3);
            }
        }

        @media (max-width: 480px) {
            .mode-header {
                justify-content: center;
            }

            .status-badge {
                order: 3;
            }

            .cam-area,
            .legend-bar {
                padding: 0 14px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
            }
        }
    </style>
</head>

<body>
    <div class="animated-bg"></div>

    <div class="mode-header">
        <a href="/?studio=1" class="back-btn">
            <span class="back-arrow">←</span>
            <span>Back to Studio</span>
        </a>
        <div class="mode-title"><span class="title-emoji">🥁</span> Drums</div>
        <div class="status-badge">
            <div class="status-dot" id="cam-dot"></div>
            <span id="cam-label">Camera Off</span>
        </div>
    </div>

    <div class="legend-bar" id="legend-bar"></div>

    <div class="cam-area">
        <div class="cam-wrap" id="cam-area">
            <video id="cam-video" playsinline muted></video>
            <canvas id="overlay"></canvas>
            <div class="finger-info" id="finger-info"></div>
            <div class="start-overlay" id="start-overlay">
                <div class="icon">🥁</div>
                <p>Play drums with your index fingers</p>
                <button id="start-btn">Start Camera</button>
            </div>
            <div class="deny-overlay" id="deny-overlay" role="alertdialog" aria-modal="true" aria-labelledby="deny-title">
                <div class="deny-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#17150f" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 7l-7 5 7 5V7z"></path>
                        <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
                        <line x1="2" y1="2" x2="22" y2="22"></line>
                    </svg>
                </div>
                <h2 id="deny-title">Turn on your camera to play Drums</h2>
                <p>We need camera access to track your fingers. Allow it in your browser, then tap below.</p>
                <button id="deny-retry-btn" type="button">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#17150f" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M23 7l-7 5 7 5V7z"></path>
                        <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
                    </svg>
                    Enable camera
                </button>
            </div>
        </div>
    </div>

    <script src="jam-core.js"></script>
    <script src="finger-drums-engine.js"></script>
    <script>
        // ===== Capture any AudioContext the page/engine creates (no new audio graph) =====
        // We only record instances so the first-gesture unlock can .resume() the SAME
        // contexts the engine owns, we never build a duplicate audio graph here.
        (function () {
            var liveAudioContexts = window.__liveAudioContexts = [];
            ['AudioContext', 'webkitAudioContext'].forEach(function (name) {
                var Native = window[name];
                if (typeof Native !== 'function' || Native.__patchedForUnlock) return;
                function Patched() {
                    var ctx = new (Function.prototype.bind.apply(Native, [null].concat([].slice.call(arguments))))();
                    liveAudioContexts.push(ctx);
                    return ctx;
                }
                Patched.prototype = Native.prototype;
                Patched.__patchedForUnlock = true;
                window[name] = Patched;
            });
        })();

        FingerDrumsEngine.init('cam-video', 'overlay', 'start-btn', 'start-overlay', 'finger-info', 'legend-bar', null, 'cam-dot', 'cam-label');

        // ===== Auto-start camera + tracking on load, with graceful denial fallback =====
        (function () {
            var startBtn = document.getElementById('start-btn');
            var startOverlay = document.getElementById('start-overlay');
            var denyOverlay = document.getElementById('deny-overlay');
            var denyRetryBtn = document.getElementById('deny-retry-btn');
            var camLabel = document.getElementById('cam-label');

            // The engine hides #start-overlay only on a successful camera start, and resets
            // the #start-btn label to a "denied/retry" string on failure. We watch for both.
            function cameraIsLive() {
                return startOverlay && startOverlay.style.display === 'none';
            }
            function startFailed() {
                // Engine sets one of these labels back onto the (re-enabled) button on failure.
                return !startBtn.disabled && /denied|Retry/i.test(startBtn.textContent || '');
            }

            function triggerStart() {
                denyOverlay.classList.remove('show');
                // Re-run the engine's real start path (getUserMedia + loadSounds + tracking).
                startBtn.click();
                // Poll briefly for the engine's outcome (it's async: sounds + getUserMedia).
                var waited = 0;
                var iv = setInterval(function () {
                    waited += 250;
                    if (cameraIsLive()) {
                        clearInterval(iv);
                        denyOverlay.classList.remove('show');
                    } else if (startFailed()) {
                        clearInterval(iv);
                        showDenial();
                    } else if (waited >= 12000) {
                        clearInterval(iv);
                        if (!cameraIsLive()) showDenial();
                    }
                }, 250);
            }

            function showDenial() {
                if (cameraIsLive()) return;
                // Hide the plain start overlay; present the on-brand denial/retry overlay instead.
                if (startOverlay) startOverlay.style.display = 'none';
                denyOverlay.classList.add('show');
                if (camLabel) camLabel.textContent = 'Camera Blocked';
            }

            // Retry button = a real user gesture: re-prompts getUserMedia AND unlocks audio.
            denyRetryBtn.addEventListener('click', triggerStart);

            // Kick off automatically once the DOM is ready (no click required).
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', triggerStart);
            } else {
                triggerStart();
            }
        })();

        // ===== Unlock Web Audio on the first user gesture (autoplay policy) =====
        // Resumes the engine's own AudioContext(s), does not create a new audio graph.
        (function () {
            function unlockAudio() {
                (window.__liveAudioContexts || []).forEach(function (ctx) {
                    if (ctx && ctx.state === 'suspended' && typeof ctx.resume === 'function') {
                        ctx.resume().catch(function () { });
                    }
                });
                document.removeEventListener('pointerdown', unlockAudio);
                document.removeEventListener('keydown', unlockAudio);
                document.removeEventListener('touchstart', unlockAudio);
            }
            document.addEventListener('pointerdown', unlockAudio, { once: false });
            document.addEventListener('keydown', unlockAudio, { once: false });
            document.addEventListener('touchstart', unlockAudio, { once: false });
        })();

        // Jam Session Initialization
        const params = new URLSearchParams(window.location.search);
        const jamRoom = params.get('jamRoom');

        // Piano Synthesis for Jam Session
        const PIANO_FREQ = {};
        for (let oct = 3; oct <= 6; oct++) {
            ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'].forEach((n, i) => {
                const midi = (oct + 1) * 12 + i;
                PIANO_FREQ[n + oct] = 440 * Math.pow(2, (midi - 69) / 12);
            });
        }

        let pianoAudioCtx = null;
        function playPianoNote(note, vel) {
            if (!pianoAudioCtx) pianoAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const freq = PIANO_FREQ[note] || PIANO_FREQ[note.toUpperCase()];
            if (!freq) return;
            const t = pianoAudioCtx.currentTime;
            const osc = pianoAudioCtx.createOscillator();
            const g = pianoAudioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, t);
            g.gain.setValueAtTime(0, t);
            g.gain.linearRampToValueAtTime(vel * 0.4, t + 0.01);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
            osc.connect(g); g.connect(pianoAudioCtx.destination);
            osc.start(t); osc.stop(t + 0.8);
        }

        if (jamRoom) {
            window.jamSessionManager = new JamSessionManager();
            window.jamSessionManager.connect(jamRoom, 'drums_' + Math.random().toString(36).slice(2, 8), 'drums');
            window.jamSessionManager.onRemoteNote = (p) => {
                if (p.instrument === 'piano') {
                    playPianoNote(p.note, p.velocity || 0.8);
                } else if (FingerDrumsEngine.playRemoteNote) {
                    FingerDrumsEngine.playRemoteNote(p.note);
                }
            };

            // Add badge
            const hdr = document.querySelector('.mode-header');
            if (hdr) {
                const badge = document.createElement('div');
                badge.className = 'status-badge';
                badge.innerHTML = `<div class="status-dot"></div><span>Jam: ${jamRoom}</span>`;
                hdr.appendChild(badge);
            }
        }
    </script>
</body>

</html>
