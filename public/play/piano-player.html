                        midiStatus.textContent = data.note_count + ' notes loaded';
                        let opt = songSelect.querySelector('option[value="' + data.song_id + '"]');
                        if (!opt) {
                            opt = document.createElement('option');
                            opt.value = data.song_id;
                            opt.textContent = (data.song_id || 'imported').replace(/_/g, ' ') + ' (MIDI)';
                            songSelect.appendChild(opt);
                        }
                        songSelect.value = data.song_id;
                    })
                    .catch(() => { midiStatus.textContent = 'Extract failed'; });
            }

            // Robust audio unlock: browsers only let an AudioContext produce sound
            // after a real user gesture ON the page. Allowing the camera prompt does
            // NOT count, so listen for several gesture types and keep trying until
            // the context is actually running.
            async function unlockAudio() {
                await initAudio();
                if (audioCtx && audioCtx.state === 'running') {
                    ['pointerdown', 'mousedown', 'touchstart', 'keydown', 'click'].forEach(
                        ev => document.removeEventListener(ev, unlockAudio)
                    );
                    console.log('[DEBUG] AudioContext unlocked (running)');
                }
            }
            ['pointerdown', 'mousedown', 'touchstart', 'keydown', 'click'].forEach(
                ev => document.addEventListener(ev, unlockAudio)
            );
        });
    </script>

    <!-- ============================================================
         MODERN HAND TRACKING, MediaPipe Tasks HandLandmarker
         Replaces the deprecated @mediapipe/hands + camera_utils CDN
         solution. Loads the LOCAL bundled model at /play/hand_landmarker.task
         and drives the page's EXISTING onResults callback (window.__handleResults)
         with the SAME { multiHandLandmarks, multiHandedness } shape.
         ============================================================ -->
    <script type="module">
        import { HandLandmarker, FilesetResolver } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18';

        const video = document.getElementById('playerVideo');   // the existing <video>
        let landmarker = null, lastVideoTime = -1, running = false;

        // Reuse the page's existing overlay helpers / note-detection callback,
        // exposed on window by the classic DOMContentLoaded script above.
        const hideCamOverlay = (denied) => { if (window.__hideCamOverlay) window.__hideCamOverlay(denied); };
        const showCamOverlay = (denied) => { if (window.__showCamOverlay) window.__showCamOverlay(denied); };
        const handleResults = (results) => { if (window.__handleResults) window.__handleResults(results); };

        async function initLandmarker() {
            const fileset = await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm');
            try {
                landmarker = await HandLandmarker.createFromOptions(fileset, {
                    baseOptions: { modelAssetPath: '/play/hand_landmarker.task', delegate: 'GPU' },
                    runningMode: 'VIDEO', numHands: 2,
                });
            } catch (e) {                       // some machines lack the GPU delegate
                landmarker = await HandLandmarker.createFromOptions(fileset, {
                    baseOptions: { modelAssetPath: '/play/hand_landmarker.task', delegate: 'CPU' },
                    runningMode: 'VIDEO', numHands: 2,
                });
            }
        }

        async function startCamera() {
            try {
                if (!landmarker) await initLandmarker();
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 960 }, height: { ideal: 720 } } });
                video.srcObject = stream;
                await video.play();
                hideCamOverlay();               // live mirrored video is now showing
                running = true;
                requestAnimationFrame(loop);
            } catch (e) {
                console.error('[CV] camera/init failed', e);
                const denied = e && (e.name === 'NotAllowedError' || e.name === 'SecurityError' || e.name === 'PermissionDeniedError');
                showCamOverlay(denied);
            }
        }

        function loop() {
            if (running && landmarker && video.readyState >= 2) {
                const now = performance.now();
                // detectForVideo needs a strictly increasing ms timestamp AND only when the
                // video frame actually advanced, otherwise it throws a "timestamp" error.
                if (video.currentTime !== lastVideoTime) {
                    lastVideoTime = video.currentTime;
                    let res;
                    try { res = landmarker.detectForVideo(video, now); } catch (e) { res = null; }
                    if (res) {
                        // The selfie display is CSS-mirrored (transform: scaleX(-1)); flip x so
                        // the tracked landmarks line up with what the user sees.
                        const multiHandLandmarks = (res.landmarks || []).map(h => h.map(p => ({ x: 1 - p.x, y: p.y, z: p.z })));
                        const multiHandedness = (res.handednesses || []).map(h => ({ label: (h && h[0] && h[0].categoryName) || 'Right' }));
                        handleResults({ multiHandLandmarks, multiHandedness });
                    }
                }
            }
            requestAnimationFrame(loop);
        }

        // Expose so the camera-denied retry button can re-run the real start path.
        window.__startHarmonicCamera = startCamera;
        // AUTO-START on load.
        startCamera();
    </script>
</body>
